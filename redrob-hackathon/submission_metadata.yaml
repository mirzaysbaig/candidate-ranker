Methodology summary: |
  An enterprise-grade, 5-stage recommender system powered by Multi-Vector FAISS and Cross-Encoder re-ranking:
  - Stage 1: Uses FAISS (dense all-MiniLM) combined with BM25 for high-speed L1 retrieval of the top candidates.
  - Stage 2: Applies deterministic hard filters to strictly drop non-relevant industries and roles.
  - Stage 3: Invokes a deep Cross-Encoder (ms-marco-MiniLM-L-6-v2) for profound semantic alignment on the top 200 candidates.
  - Stage 4: Applies over 15 behavioral modifiers (Gaussian experience bands, logarithmic GitHub scaling, coherence penalties) to generate mathematically normalized scores (0.5 to 1.0).
  - Stage 5: Generates dynamic, LLM-free reasoning strings summarizing the exact behavioral multipliers that drove each candidate's rank.
